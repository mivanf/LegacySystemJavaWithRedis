version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qris-payment-app
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/qris_payment
      SPRING_DATASOURCE_USERNAME: qris_user
      SPRING_DATASOURCE_PASSWORD: qris_secret_2024
      JWT_SECRET: YTJiM2M0ZDVlNmY3ZzhoOWkwajFrMmwzbTRuNW82cDdxOHI5czB0MXUydjN3NHg1eTZ6N2E4YjljMGQxZTJm
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - qris-network
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: qris-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: qris_payment
      POSTGRES_USER: qris_user
      POSTGRES_PASSWORD: qris_secret_2024
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U qris_user -d qris_payment" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - qris-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  qris-network:
    driver: bridge
